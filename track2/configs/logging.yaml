# logging.yaml
# Python logging configuration

version: 1

disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:

  console: # when running project
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file: # stores everything in a log file
    class: logging.FileHandler
    level: DEBUG
    formatter: standard
    filename: track2/logs/track2.log
    encoding: utf-8

root:
  level: DEBUG
  handlers:
    - console
    - file
