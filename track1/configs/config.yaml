# config.yaml
# main configuration file

project:
  name: "AI City Track 1"
  version: "1.0"

paths:
  video: "data/raw/sample.avi"
  output_dir: "outputs"
  model_dir: "models"
  homography: "data/calibration/homography.npy"

video:
  process_fps: 10
  display: true
  default_video: "data/raw/sample.avi"
  backend: "opencv"          # Future: ffmpeg, gstreamer
  buffer_size: 1             # Reserved for future streaming support

logging:
  level: INFO

detection:
  algorithm: "ultralytics"          # ultralytics | faster_rcnn
  model: "yolo11n.pt"
  confidence: 0.25
  iou: 0.45
  device: "cuda"             # cpu | cuda | mps
  classes:
    - car
    - bus
    - truck
    - motorcycle

tracking:
  algorithm: "bytetrack"

  frame_rate: 30

  bytetrack:
    track_activation_threshold: 0.25
    lost_track_buffer: 30
    minimum_matching_threshold: 0.8
    minimum_consecutive_frames: 3
    minimum_box_area: 10

  deepsort:
    max_age: 30
    nn_budget: 100
    max_cosine_distance: 0.2

  botsort:
    proximity_thresh: 0.5
    appearance_thresh: 0.25

speed:
  algorithm: "pixel"

  pixel:
    smoothing_window: 5

  homography:
    smoothing_window: 5

  optical_flow:
    window_size: 15
    pyramid_levels: 3

  hybrid:
    homography_weight: 0.7
    optical_flow_weight: 0.3

# speed:                            (after caliberation)
#   algorithm: "homography"

#   homography:
#     smoothing_window: 5

#   optical_flow:
#     window_size: 15
#     pyramid_levels: 3

#   hybrid:
#     homography_weight: 0.7
#     optical_flow_weight: 0.3

# ============================================================================
# Benchmark Configuration
# ============================================================================

benchmark:
  benchmark:

  detectors:

    - algorithm: ultralytics
      model: yolo11n.pt

    - algorithm: ultralytics
      model: yolo26n.pt

    - algorithm: rtdetr
      model: rtdetr-l.pt

    - algorithm: faster_rcnn
      model: fasterrcnn_resnet50_fpn
  trackers:
    - bytetrack
    - deepsort
    - botsort
  save_video: true
  save_csv: true
  save_json: true
  output_directory: "outputs"
  display: false