# config.yaml
# main configuration file

project:
  name: "AI City Track 1"
  version: "1.0"

paths:
  video: data/calibration/homography.npy
  output_dir: "outputs"
  model_dir: "models"

video:
  process_fps: 10
  display: true
  default_video: "data/raw/sample.mp4"
  backend: "opencv"          # Future: ffmpeg, gstreamer
  buffer_size: 1             # Reserved for future streaming support

logging:
  level: INFO

detection:
  algorithm: "yolo"          # yolo | rtdetr | faster_rcnn | mask_rcnn | ssd
  model: "yolo26"
  weights: "models/yolo26n.pt"
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: "cuda"             # cpu | cuda | mps
  classes:
    - car
    - bus
    - truck
    - motorcycle

tracking:
  algorithm: "bytetrack"
  track_activation_threshold: 0.25
  lost_track_buffer: 30
  minimum_matching_threshold: 0.8
  minimum_consecutive_frames: 3
  frame_rate: 30
  minimum_box_area: 10

speed:
  algorithm: homography