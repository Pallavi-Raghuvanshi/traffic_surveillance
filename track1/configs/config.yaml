# config.yaml
# main configuration file

project:
  name: "AI City Track 1"
  version: "1.0"

paths:
  dataset: /content/drive/MyDrive/MinorProject/datasets/ai_city_2022  
  output_dir: "outputs"
  model_dir: "models"

video:
  process_fps: 10
  display: true
  default_video: "data/raw/sample.mp4"
  backend: "opencv"          # Future: ffmpeg, gstreamer
  buffer_size: 1             # Reserved for future streaming support

logging:
  level: INFO

detection:
  algorithm: "yolo"          # yolo | rtdetr | faster_rcnn | mask_rcnn | ssd
  model: "yolo26"
  weights: "models/yolo26n.pt"
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: "cuda"             # cpu | cuda | mps
  classes:
    - car
    - bus
    - truck
    - motorcycle

tracking:
  algorithm: "bytetrack"

  frame_rate: 30

  bytetrack:
    track_activation_threshold: 0.25
    lost_track_buffer: 30
    minimum_matching_threshold: 0.8
    minimum_consecutive_frames: 3
    minimum_box_area: 10

  deepsort:
    max_age: 30
    nn_budget: 100
    max_cosine_distance: 0.2

  botsort:
    proximity_thresh: 0.5
    appearance_thresh: 0.25

speed:
  algorithm: "homography"

  homography:
    smoothing_window: 5

  optical_flow:
    window_size: 15
    pyramid_levels: 3

  hybrid:
    homography_weight: 0.7
    optical_flow_weight: 0.3