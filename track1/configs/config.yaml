# config.yaml
# main configuration file

project:
  name: "AI City Track 1"
  version: "1.0"

paths:
  video: "data/raw/test.mp4"
  output_dir: "outputs"
  model_dir: "models"

video:
  process_fps: 10
  display: true
  default_video: "data/raw/sample.mp4"
  backend: "opencv"          # Future: ffmpeg, gstreamer
  buffer_size: 1             # Reserved for future streaming support

logging:
  level: INFO

detection:
  model: "yolo26"
  weights: "models/yolo26n.pt"
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: "cuda" # Options: "cpu", "cuda", "mps"
  classes:
    - car
    - bus
    - truck
    - motorcycle
