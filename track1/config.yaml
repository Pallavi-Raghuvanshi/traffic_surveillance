# config.yaml

# ============================================================================
# Main configuration for the Traffic Surveillance System
# ============================================================================

project:
  name: "AI City Track 1"
  version: "1.0"

# ============================================================================
# Paths
# ============================================================================

paths:
  video: "data/raw/sample.avi"
  default_video: "data/raw/sample.avi"
  model_dir: "models"
  homography: "data/calibration/homography.npy"
  output_dir: "outputs"

# ============================================================================
# Logging
# ============================================================================

logging:
  level: INFO

# ============================================================================
# Video
# ============================================================================

video:
  process_fps: 10
  display: true
  backend: opencv
  buffer_size: 1

# ============================================================================
# Detection
# ============================================================================

detection:

  algorithm: ultralytics
  model: "models/yolo11n.pt"
  confidence: 0.25
  iou: 0.45
  device: cuda
  classes:
    - car
    - bus
    - truck
    - motorcycle

# ============================================================================
# Tracking
# ============================================================================

tracking:
  algorithm: bytetrack
  bytetrack:
    track_activation_threshold: 0.25
    lost_track_buffer: 30
    minimum_matching_threshold: 0.80
    frame_rate: 10
  deepsort:
    max_age: 30
    n_init: 3
    max_iou_distance: 0.70
    max_cosine_distance: 0.20
  botsort:
    track_high_thresh: 0.50
    track_low_thresh: 0.10
    new_track_thresh: 0.60
    match_thresh: 0.80
    track_buffer: 30
    fuse_score: true
    proximity_thresh: 0.50
    appearance_thresh: 0.25
    with_reid: false
    gmc_method: sparseOptFlow
    model: auto

# ============================================================================
# Speed Estimation
# ============================================================================

speed:
  algorithm: pixel
  pixel:
    smoothing_window: 5
  homography:
    smoothing_window: 5
  optical_flow:
    window_size: 15
    pyramid_levels: 3
  hybrid:
    homography_weight: 0.70
    optical_flow_weight: 0.30

# ============================================================================
# Benchmark
# ============================================================================

benchmark:

  enabled: false
  type: detector
  experiment_name: null
  output_directory: outputs

  detector:
    algorithm: ultralytics
    model: models/yolo11n.pt

  detectors:

    - algorithm: ultralytics
      model: models/yolo11n.pt

    - algorithm: ultralytics
      model: models/yolo26n.pt

    - algorithm: rtdetr
      model: models/rtdetr-l.pt

    - algorithm: faster_rcnn
      model: torchvision

  trackers:

    - bytetrack
    - deepsort
    - botsort

  save_video: true
  save_csv: true
  save_json: true
  display: false